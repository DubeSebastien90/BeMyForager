name: bemyforager
description: "A plant identification and collection app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  http: ^1.2.2
  flutter_dotenv: ^5.2.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  easy_localization: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.9.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/bemyforager_icon_clean.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/translations/
