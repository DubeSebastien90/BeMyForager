name: bemyforager
description: "A plant identification and collection app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  http: ^1.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  easy_localization: ^3.0.7
  url_launcher: ^6.3.0
  gal: ^1.1.2
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.9.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appIcon.png"
  image_path_ios: "assets/app_icon_1024.png"
  adaptive_icon_foreground: "assets/appIcon-removebg.png"
  adaptive_icon_background: "#388E3C"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
